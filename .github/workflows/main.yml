name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g., v1.0.0)'
        required: true
        default: 'manual-build'
  release:
    types: [prereleased]
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yml"

permissions: write-all

jobs:
  build:
    strategy:
      matrix:
        # Include amd64 on all platforms.
        # goos: [windows, linux, darwin]
        # goarch: [amd64, 386]
        goos: [windows]
        goarch: [386]
        exclude:
          # Exclude i386 on darwin.
          - goarch: 386
            goos: darwin
        # include:
          # # BEGIN Linux ARM 5 6 7
          # - goos: linux
          #   goarch: arm
          #   goarm: 7
          # - goos: linux
          #   goarch: arm
          #   goarm: 6
          # - goos: linux
          #   goarch: arm
          #   goarm: 5
          # # END Linux ARM 5 6 7
          # # BEGIN Windows ARM 7
          # - goos: windows
          #   goarch: arm
          #   goarm: 7
          # # END Windows ARM 7
          # # BEGIN Other architectures
          # - goos: darwin
          #   goarch: arm64
          # - goos: linux
          #   goarch: arm64
          # - goos: linux
          #   goarch: riscv64
          # - goos: windows
          #   goarch: arm64
          # - goos: android
          #   goarch: arm64
          # # BEGIN MIPS
          # - goos: linux
          #   goarch: mips64
          # - goos: linux
          #   goarch: mips64le
          # - goos: linux
          #   goarch: mipsle
          # - goos: linux
          #   goarch: mips
          # # END MIPS
          # # END Other architectures
      fail-fast: false

    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: 0

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v3

      - name: Show workflow information
        id: get_filename
        run: |
          export _NAME=$GOOS-$GOARCH$GOARM
          echo "GOOS: $GOOS, GOARCH: $GOARCH, GOARM: $GOARM, RELEASE_NAME: $_NAME"
          echo "::set-output name=ASSET_NAME::$_NAME"
          echo "ASSET_NAME=$_NAME" >> $GITHUB_ENV
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.19

      - name: Get project dependencies
        run: go mod download

      - name: Build
        run: |
          mkdir -p build_assets
          go build -v -o build_assets/EasierConnect -trimpath -ldflags "-s -w -buildid=" .
      - name: Rename Windows EasierConnect
        if: matrix.goos == 'windows'
        run: |
          cd ./build_assets || exit 1
          if [ -f EasierConnect ]; then
            mv EasierConnect EasierConnect.exe
          else
            echo "EasierConnect binary not found!" >&2
            exit 1
          fi
      - name: Create ZIP archive
        run: |
          pushd build_assets || exit 1
          # zip -9vr ../EasierConnect-$ASSET_NAME.zip .
          if [ -f EasierConnect.exe ]; then
            zip -9vr ../EasierConnect-$ASSET_NAME.zip EasierConnect.exe
          else
            echo "EasierConnect.exe not found, zip failed!" >&2
            exit 1
          fi
      
      - name: Upload release binary
        # if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # gh release upload ${{ github.event.release.tag_name }} EasierConnect-${{ steps.get_filename.outputs.ASSET_NAME }}.zip
          # 如果是手动触发，使用 inputs.tag_name；如果是 release 事件，使用 event.release.tag_name
          TAG_NAME="${{ inputs.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          fi

          # 如果仍然为空（例如 push 事件），则报错或生成一个默认标签
          if [ -z "$TAG_NAME" ]; then
            echo "Error: No tag name provided for this event."
            exit 1
          fi

          echo "Uploading to tag: $TAG_NAME"

          # 确保 Release 存在
          # 手动触发时通常没有 Release，需要先创建
          # --generate-notes 会自动生成发布说明
          gh release view "$TAG_NAME" || gh release create "$TAG_NAME" --generate-notes --target main

          # 上传文件
          gh release upload "$TAG_NAME" EasierConnect-${{ steps.get_filename.outputs.ASSET_NAME }}.zip --clobber

